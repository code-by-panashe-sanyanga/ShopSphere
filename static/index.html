<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShopSphere</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Top bar with the shop name and the running total -->
  <header>
    <h1>ShopSphere</h1>
    <span id="total">Total: $0.00</span>
  </header>

  <main>
    <!-- Left side: the list of products you can buy -->
    <section class="products">
      <h2>Products</h2>
      <div id="products" class="grid"></div>
    </section>

    <!-- Right side: your cart -->
    <aside class="cart">
      <h2>Your cart</h2>
      <ul id="cart"></ul>
      <div class="cart-buttons">
        <button id="checkout">Checkout</button>
        <button id="clear" class="secondary">Clear cart</button>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
